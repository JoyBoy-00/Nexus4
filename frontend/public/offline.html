<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Nexus | Offline</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 10% 10%, rgba(10, 186, 181, 0.16), transparent 35%),
          radial-gradient(circle at 90% 90%, rgba(34, 197, 94, 0.14), transparent 35%),
          linear-gradient(155deg, #f5f7fb 0%, #ebeff7 55%, #e2e9f3 100%);
        color: #111827;
      }

      .card {
        width: min(100%, 480px);
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(17, 24, 39, 0.12);
        border-radius: 20px;
        padding: 28px;
        text-align: center;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
        backdrop-filter: blur(8px);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: #065f46;
        background: rgba(16, 185, 129, 0.15);
        border: 1px solid rgba(5, 150, 105, 0.2);
        padding: 6px 10px;
        border-radius: 999px;
        margin-bottom: 16px;
      }

      img {
        width: 92px;
        height: 92px;
        margin-bottom: 0.75rem;
        border-radius: 20px;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.2);
      }

      h1 {
        font-size: 1.55rem;
        margin: 0 0 0.6rem;
      }

      p {
        margin: 0 0 1.5rem;
        line-height: 1.5;
        color: #374151;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      a {
        display: inline-block;
        padding: 0.68rem 1.05rem;
        border-radius: 999px;
        border: 1px solid transparent;
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
      }

      .primary {
        background: #111827;
      }

      .secondary {
        background: rgba(255, 255, 255, 0.8);
        color: #111827;
        border-color: rgba(17, 24, 39, 0.18);
      }

      @media (prefers-color-scheme: dark) {
        body {
          background:
            radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.18), transparent 35%),
            radial-gradient(circle at 90% 90%, rgba(20, 184, 166, 0.16), transparent 35%),
            linear-gradient(155deg, #0f172a 0%, #101d2f 55%, #0b1424 100%);
          color: #f3f4f6;
        }

        .card {
          background: rgba(15, 23, 42, 0.82);
          border-color: rgba(148, 163, 184, 0.25);
          box-shadow: 0 20px 42px rgba(2, 6, 23, 0.45);
        }

        p {
          color: #cbd5e1;
        }

        .tag {
          color: #a7f3d0;
          background: rgba(16, 185, 129, 0.18);
          border-color: rgba(110, 231, 183, 0.2);
        }

        .primary {
          background: #34d399;
          color: #052e16;
        }

        .secondary {
          background: rgba(148, 163, 184, 0.14);
          color: #e5e7eb;
          border-color: rgba(148, 163, 184, 0.26);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="tag">Offline Mode</span>
      <img src="/icon-192x192.png" alt="Nexus" />
      <h1>You are offline</h1>
      <p>
        Nexus cannot reach the network right now. Reconnect to continue with
        live chat, referrals, and updates.
      </p>
      <div class="actions">
        <a class="primary" href="/">Try again</a>
        <a class="secondary" href="/dashboard">Open dashboard</a>
      </div>
    </main>
  </body>
</html>
